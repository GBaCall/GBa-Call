<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>吉什麼抽抽樂</title>
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #f8f9fa;
            height: 100vh; overflow: hidden; font-family: "Microsoft JhengHei", sans-serif;
            display: flex; flex-direction: column;
        }

        .app-container {
            width: 100%; height: 100vh;
            display: flex; flex-direction: column;
        }

        /* 1. 頂部倒數條 (8%) */
        #timer-display {
            height: 8vh;
            display: flex; justify-content: space-between; align-items: center; 
            background: #fffde7; border-bottom: 2px solid #fbc02d; 
            padding: 0 15px; flex-shrink: 0; box-sizing: border-box;
        }

        /* 2. 標題區 (28%) */
        .header-section {
            height: 28vh;
            display: flex; justify-content: center; align-items: center;
            flex-shrink: 0;
        }
        .header-section lottie-player { height: 95%; width: auto; }

        /* 3. 單向無限跑馬燈 (5%) */
        .lucky-text-container {
            height: 5vh;
            width: 100%;
            overflow: hidden;
            background: #fff;
            display: flex; align-items: center;
            flex-shrink: 0;
            border-bottom: 1px dashed #fbc02d;
            position: relative;
        }

        .lucky-text {
            position: absolute;
            white-space: nowrap;
            font-size: 1.2rem;
            font-weight: 900;
            color: #ff3d00;
            /* 調整閃爍：最暗到 0.5 (50%)，陰影縮小更銳利一些 */
            animation: single-marquee 8s linear infinite, sharp-blink 0.8s infinite;
        }

        /* 單向循環動畫：從右外側移動到左外側 */
        @keyframes single-marquee {
            0% { left: 100%; }
            100% { left: -100%; }
        }

        /* 銳利閃爍動畫：透明度最低只到 0.5 */
        @keyframes sharp-blink {
            0%, 100% { opacity: 1; text-shadow: 0 0 3px #ffeb3b; }
            50% { opacity: 0.5; text-shadow: 0 0 5px #ffeb3b; }
        }

        /* 4. 紅包網格區 (59%) */
        .grid-section {
            height: 59vh;
            display: flex; flex-wrap: wrap;
            justify-content: space-evenly; 
            align-content: space-around;
            padding: 5px 10px 15px 10px;
            box-sizing: border-box;
        }

        .envelope-box {
            width: 28%; height: 46%;
            display: flex; justify-content: center; align-items: center;
        }
        .envelope-box lottie-player { width: 100%; height: 100%; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="timer-display">
        <div style="color: red; font-weight: bold; font-size: 0.9rem;">
            剩餘時間：<span id="time">10:00</span>
        </div>
        <button onclick="manualClose()" style="padding: 5px 12px; border-radius: 20px; border: 1px solid #fbc02d; background: #fff; color: #d32f2f; font-size: 0.75rem; font-weight: bold;">
            離開
        </button>
    </div>

    <div class="header-section">
        <lottie-player src="GBaCall.lot" speed="1" loop autoplay></lottie-player>
    </div>    

    <div class="lucky-text-container">
        <div class="lucky-text">🧧 請選一個！祝您好運！ 🧧</div>
    </div>
    
    <div class="grid-section">
        <div class="envelope-box" onclick="openPacket(this)"><lottie-player class="p-anim"></lottie-player></div>
        <div class="envelope-box" onclick="openPacket(this)"><lottie-player class="p-anim"></lottie-player></div>
        <div class="envelope-box" onclick="openPacket(this)"><lottie-player class="p-anim"></lottie-player></div>
        <div class="envelope-box" onclick="openPacket(this)"><lottie-player class="p-anim"></lottie-player></div>
        <div class="envelope-box" onclick="openPacket(this)"><lottie-player class="p-anim"></lottie-player></div>
        <div class="envelope-box" onclick="openPacket(this)"><lottie-player class="p-anim"></lottie-player></div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;    
    tg.ready();
    tg.expand();
    tg.enableClosingConfirmation();

    const openSound = new Audio('press.mp3');
    openSound.preload = 'auto';
    
    const urlParams = new URLSearchParams(window.location.search);
    const prize = urlParams.get('startapp') || urlParams.get('prize') || 'sorry'; 
    const prizeFiles = { '25':'25.lot', '20':'20.lot', '15':'15.lot', '10':'10.lot', '5':'5.lot', 'sorry':'sorry.lot' };

    document.querySelectorAll('.p-anim').forEach(player => {
        player.load(prizeFiles[prize]);
    });

    let hasOpened = false;
    function openPacket(el) {
        if (hasOpened) return;
        hasOpened = true;
        openSound.play().catch(e => console.log(e));
        const player = el.querySelector('.p-anim');
        player.play();
    }

    function manualClose() {
        if (confirm("確定已核銷並離開嗎？")) { tg.close(); }
    }

    function startCountdown(duration) {
        const display = document.querySelector('#time');
        let timer = duration;
        const interval = setInterval(function () {
            let min = parseInt(timer / 60, 10);
            let sec = parseInt(timer % 60, 10);
            display.textContent = (min < 10 ? "0" + min : min) + ":" + (sec < 10 ? "0" + sec : sec);
            if (--timer < 0) { 
                clearInterval(interval); 
                display.textContent = "已失效";
                tg.close(); 
            }
        }, 1000);
    }
    startCountdown(600);
</script>
</body>
</html>
