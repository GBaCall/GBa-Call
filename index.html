<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>吉什麼抽抽樂</title>
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        body {
            margin: 0; padding: 0;
            background: transparent; /* 讓背景透明才能看到 Telegram */
            height: 100vh; overflow: hidden; font-family: sans-serif;
            display: flex; flex-direction: column; justify-content: flex-end;
        }

        .app-container {
            width: 100%; 
            height: 80vh; /* 鎖定 80% 高度 */
            background-color: #f8f9fa;
            border-radius: 24px 24px 0 0;
            display: flex; flex-direction: column;
            overflow: hidden; /* 禁止整頁滑動 */
        }

        /* 1. 頂部倒數條：固定高度 */
        #timer-display {
            height: 8vh; /* 佔總高度的 8% */
            display: flex; justify-content: space-between; align-items: center; 
            background: #fffde7; border-bottom: 2px solid #fbc02d; 
            padding: 0 20px; flex-shrink: 0;
        }

        /* 2. 標題區：固定高度 */
        .header-section {
            height: 22vh; /* 佔總高度的 22% */
            display: flex; justify-content: center; align-items: center;
            flex-shrink: 0;
        }

        .header-section lottie-player {
            height: 90%; width: auto; /* 以高度為基準縮放 */
        }

        /* 3. 紅包網格區：自動計算剩餘高度 */
        .grid-section {
            height: 50vh; /* 佔總高度的 50% (8+22+50=80) */
            display: flex; flex-wrap: wrap;
            justify-content: space-evenly; 
            align-content: space-around; /* 讓紅包垂直均分空間 */
            padding: 5px 10px;
            box-sizing: border-box;
        }

        .envelope-box {
            width: 28%; 
            height: 45%; /* 兩排紅包，每排佔接近一半的高度 */
            display: flex; justify-content: center; align-items: center;
        }

        .envelope-box lottie-player {
            width: 100%; height: 100%;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div id="timer-display">
        <div style="color: red; font-weight: bold; font-size: 0.9rem;">
            剩餘：<span id="time">10:00</span>
        </div>
        <button onclick="manualClose()" style="padding: 5px 12px; border-radius: 20px; border: 1px solid #fbc02d; background: #fff; color: #d32f2f; font-size: 0.75rem; font-weight: bold;">
            離開
        </button>
    </div>

    <div class="header-section">
        <lottie-player src="GBaCall.lot" speed="1" loop autoplay></lottie-player>
    </div>    
    
    <div class="grid-section">
        <div class="envelope-box" onclick="openPacket(this)"><lottie-player class="p-anim"></lottie-player></div>
        <div class="envelope-box" onclick="openPacket(this)"><lottie-player class="p-anim"></lottie-player></div>
        <div class="envelope-box" onclick="openPacket(this)"><lottie-player class="p-anim"></lottie-player></div>
        <div class="envelope-box" onclick="openPacket(this)"><lottie-player class="p-anim"></lottie-player></div>
        <div class="envelope-box" onclick="openPacket(this)"><lottie-player class="p-anim"></lottie-player></div>
        <div class="envelope-box" onclick="openPacket(this)"><lottie-player class="p-anim"></lottie-player></div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;    
    tg.ready();
    // 注意：這裡絕對不能寫 tg.expand(); 否則 20% 會變黑塊
    tg.enableClosingConfirmation();

    const openSound = new Audio('press.mp3');
    openSound.preload = 'auto';
    
    const urlParams = new URLSearchParams(window.location.search);
    const prize = urlParams.get('startapp') || urlParams.get('prize') || 'sorry'; 
    const prizeFiles = { '25':'25.lot', '20':'20.lot', '15':'15.lot', '10':'10.lot', '5':'5.lot', 'sorry':'sorry.lot' };

    document.querySelectorAll('.p-anim').forEach(player => {
        player.load(prizeFiles[prize]);
    });

    let hasOpened = false;
    function openPacket(el) {
        if (hasOpened) return;
        hasOpened = true;
        openSound.play().catch(e => console.log(e));
        const player = el.querySelector('.p-anim');
        player.play();
    }

    function manualClose() {
        if (confirm("確定已核銷並離開嗎？")) { tg.close(); }
    }

    function startCountdown(duration) {
        const display = document.querySelector('#time');
        let timer = duration;
        const interval = setInterval(function () {
            let min = parseInt(timer / 60, 10);
            let sec = parseInt(timer % 60, 10);
            display.textContent = (min < 10 ? "0" + min : min) + ":" + (sec < 10 ? "0" + sec : sec);
            if (--timer < 0) { clearInterval(interval); tg.close(); }
        }, 1000);
    }
    startCountdown(600);
</script>
</body>
</html>
