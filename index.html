<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>吉什麼抽抽樂</title>
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #f8f9fa;
            height: 100vh; overflow: hidden; font-family: "Microsoft JhengHei", sans-serif;
            display: flex; flex-direction: column;
        }

        .app-container { width: 100%; height: 100vh; display: flex; flex-direction: column; }

        /* 1. 頂部狀態條 */
        #timer-display {
            height: 8vh;
            display: flex; justify-content: space-between; align-items: center; 
            background: #fffde7; border-bottom: 2px solid #fbc02d; 
            padding: 0 15px; flex-shrink: 0; box-sizing: border-box;
        }

        /* 2. 標題區 */
        .header-section { height: 28vh; display: flex; justify-content: center; align-items: center; flex-shrink: 0; }
        .header-section lottie-player { height: 95%; width: auto; }

        /* 3. 中間控制區 / 跑馬燈 */
        .control-zone {
            height: 5vh; width: 100%; overflow: hidden; background: #fff;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; border-bottom: 1px dashed #fbc02d; position: relative;
        }

        /* START 按鈕樣式 */
        #start-btn {
            background: #ff3d00; color: white; border: none; padding: 2px 30px;
            font-size: 1.2rem; font-weight: 900; border-radius: 15px; cursor: pointer;
            animation: pulse 1s infinite; z-index: 10;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .lucky-text {
            position: absolute; white-space: nowrap; font-size: 1.2rem;
            font-weight: 900; color: #ff3d00; display: none; /* 初始隱藏 */
            animation: single-marquee 8s linear infinite, sharp-blink 0.8s infinite;
        }

        @keyframes single-marquee { 0% { left: 100%; } 100% { left: -100%; } }
        @keyframes sharp-blink {
            0%, 100% { opacity: 1; text-shadow: 0 0 3px #ffeb3b; }
            50% { opacity: 0.5; text-shadow: 0 0 5px #ffeb3b; }
        }

        /* 4. 紅包網格區 */
        .grid-section {
            height: 59vh; display: flex; flex-wrap: wrap;
            justify-content: space-evenly; align-content: space-around;
            padding: 5px 10px 15px 10px; box-sizing: border-box;
        }

        .envelope-box { width: 28%; height: 46%; display: flex; justify-content: center; align-items: center; }
        .envelope-box lottie-player { width: 100%; height: 100%; }
        
        /* 離開按鈕初始隱藏 */
        #manual-exit { display: none; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="timer-display">
        <div style="color: red; font-weight: bold; font-size: 0.9rem;">
            剩餘時間：<span id="time">00:10</span>
        </div>
        <button id="manual-exit" onclick="manualClose()" style="padding: 5px 12px; border-radius: 20px; border: 1px solid #fbc02d; background: #fff; color: #d32f2f; font-size: 0.75rem; font-weight: bold;">
            離開
        </button>
    </div>

    <div class="header-section">
        <lottie-player src="GBaCall.lot" speed="1" loop autoplay></lottie-player>
    </div>    

    <div class="control-zone">
        <button id="start-btn" onclick="startGame()">START</button>
        <div id="marquee-text" class="lucky-text">🧧 請選一個！祝您好運！ 🧧</div>
    </div>
    
    <div class="grid-section">
        <div class="envelope-box" onclick="openPacket(this)"><lottie-player class="p-anim"></lottie-player></div>
        <div class="envelope-box" onclick="openPacket(this)"><lottie-player class="p-anim"></lottie-player></div>
        <div class="envelope-box" onclick="openPacket(this)"><lottie-player class="p-anim"></lottie-player></div>
        <div class="envelope-box" onclick="openPacket(this)"><lottie-player class="p-anim"></lottie-player></div>
        <div class="envelope-box" onclick="openPacket(this)"><lottie-player class="p-anim"></lottie-player></div>
        <div class="envelope-box" onclick="openPacket(this)"><lottie-player class="p-anim"></lottie-player></div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;    
    tg.ready();
    tg.expand();
    tg.enableClosingConfirmation();

    const openSound = new Audio('press.mp3');
    openSound.preload = 'auto';
    
    const urlParams = new URLSearchParams(window.location.search);
    const prize = urlParams.get('startapp') || urlParams.get('prize') || 'sorry'; 
    const prizeFiles = { '25':'25.lot', '20':'20.lot', '15':'15.lot', '10':'10.lot', '5':'5.lot', 'sorry':'sorry.lot' };

    let hasOpened = false;
    let gameStarted = false;

    // 預載 Lottie 資源但不播放
    document.querySelectorAll('.p-anim').forEach(player => {
        player.load(prizeFiles[prize]);
    });

    // 啟動遊戲
    function startGame() {
        if (gameStarted) return;
        gameStarted = true;

        // 1. 發送數據給 Bot (觸發刪除按鈕)
        tg.sendData("process_started");

        // 2. 切換 UI 狀態
        document.getElementById('start-btn').style.display = 'none';
        document.getElementById('marquee-text').style.display = 'block';
        document.getElementById('manual-exit').style.display = 'block';

        // 3. 開始 10 秒倒數
        runCountdown(10);
    }

    function openPacket(el) {
        if (!gameStarted || hasOpened) return; // 沒點 START 或已開啟則無效
        hasOpened = true;
        openSound.play().catch(e => console.log(e));
        const player = el.querySelector('.p-anim');
        player.play();
    }

    function manualClose() {
        if (confirm("確定要離開嗎？")) { tg.close(); }
    }

    function runCountdown(duration) {
        const display = document.querySelector('#time');
        let timer = duration;
        const interval = setInterval(function () {
            let min = parseInt(timer / 60, 10);
            let sec = parseInt(timer % 60, 10);
            display.textContent = (min < 10 ? "0" + min : min) + ":" + (sec < 10 ? "0" + sec : sec);
            
            if (--timer < 0) { 
                clearInterval(interval);
                if (!hasOpened) {
                    // 強迫開獎：隨機挑選一個紅包
                    const boxes = document.querySelectorAll('.envelope-box');
                    const randomIdx = Math.floor(Math.random() * boxes.length);
                    openPacket(boxes[randomIdx]);
                }
                display.textContent = "已結束";
                // 3秒後自動關閉(選配，可讓客人看清楚抽到什麼)
                setTimeout(() => { tg.close(); }, 3000);
            }
        }, 1000);
    }
</script>
</body>
</html>
