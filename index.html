<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>紅包抽獎</title>
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        body {
            margin: 0; padding: 0;
            background-color: rgba(0, 0, 0, 0.6);
            display: flex; flex-direction: column; justify-content: flex-end;
            height: 100vh; overflow: hidden; font-family: sans-serif;
        }
        /* 容器 80% 高度 */
        .app-container {
            width: 100%; height: 80vh;
            background-color: #f8f9fa;
            border-radius: 24px 24px 0 0;
            display: flex; flex-direction: column;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.3);
        }
        /* 標題區：縮小標題關鍵在這裡 */
        .header-section {
            flex: 2.2; /* 從 2.5 調小到 1.8，讓出高度 */
            display: flex; justify-content: center; align-items: center;
            padding: 20px 0 0 0; /* 縮減間距 */
        }
        .header-section lottie-player {
            width: 65%; /* 直接控制標題寬度為 45%，它就不會佔滿整個畫面 */
            height: auto;
            aspect-ratio: 1 / 1; /* 它是正方形 */
        }
        /* 紅包網格區 (配合你新改的 300x540) */
        .grid-section {
            flex: 7.8; /* 給紅包區更多空間 */
            display: flex; flex-wrap: wrap;
            justify-content: space-around; 
            align-content: flex-start;             
            padding: 10px;
            gap: 10px; /* 使用 gap 來控制紅包之間的距離，更直觀 */
        }
        .envelope-box {
            width: 29%; /* 稍微縮小寬度，增加左右間隔 */
            aspect-ratio: 300 / 540; /* 【重要】請確認跟你的畫布尺寸一致 */
            margin-bottom: 10px; /* 縮小上下間距，解決你說間隔太大的問題 */
            cursor: pointer;
        }
        .envelope-box lottie-player {
            width: 100%; height: 100%;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header-section">
        <lottie-player src="GBaCall.lot" speed="1" loop autoplay></lottie-player>
    </div>

    <div class="grid-section">
        <div class="envelope-box" onclick="openPacket(this)"><lottie-player class="p-anim"></lottie-player></div>
        <div class="envelope-box" onclick="openPacket(this)"><lottie-player class="p-anim"></lottie-player></div>
        <div class="envelope-box" onclick="openPacket(this)"><lottie-player class="p-anim"></lottie-player></div>
        <div class="envelope-box" onclick="openPacket(this)"><lottie-player class="p-anim"></lottie-player></div>
        <div class="envelope-box" onclick="openPacket(this)"><lottie-player class="p-anim"></lottie-player></div>
        <div class="envelope-box" onclick="openPacket(this)"><lottie-player class="p-anim"></lottie-player></div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();

    const urlParams = new URLSearchParams(window.location.search);
    const prize = urlParams.get('prize') || 'sorry';
    
    const prizeFiles = {
        '25': '25.lot', '20': '20.lot', '15': '15.lot',
        '10': '10.lot', '5': '5.lot', 'sorry': 'sorry.lot'
    };

    document.querySelectorAll('.p-anim').forEach(player => {
        player.load(prizeFiles[prize]);
    });

    let hasOpened = false;
    function openPacket(el) {
        if (hasOpened) return;
        hasOpened = true;
        const player = el.querySelector('.p-anim');
        player.play();
        
        // 播完後自動關閉，時間可根據你的動畫長度微調
        setTimeout(() => { tg.close(); }, 3500);
    }
</script>
</body>
</html>
