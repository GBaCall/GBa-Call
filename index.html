<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>紅包抽獎</title>
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        body {
            margin: 0; padding: 0;
            background-color: rgba(0, 0, 0, 0.6);
            display: flex; flex-direction: column; justify-content: flex-end;
            height: 100vh; overflow: hidden; font-family: sans-serif;
        }
        /* 1. 讓容器可以根據內容自動伸展，不要死鎖在 80vh */
        .app-container {
            width: 100%; 
            min-height: 85vh; /* 改用 min-height，確保內容多時可以長高 */
            background-color: #f8f9fa;
            border-radius: 24px 24px 0 0;
            display: flex; flex-direction: column;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.3);
            padding-bottom: 20px; /* 增加底部留白，避免貼齊邊緣 */
        }

        /* 2. 標題放大後，微調佔比 */
        .header-section {
            flex: 0 0 auto; /* 不參加分配，由內容決定高度 */
            display: flex; justify-content: center; align-items: center;
            padding: 30px 0 10px 0; 
        }

        .header-section lottie-player {
            width: 65%; /* 標題維持你覺得剛好的 65% */
            height: auto;
            aspect-ratio: 1 / 1;
        }

        /* 3. 紅包網格區：解決切掉的關鍵 */
        .grid-section {
            flex: 1; /* 自動填滿剩餘空間 */
            display: flex; flex-wrap: wrap;
            justify-content: space-evenly; 
            align-content: flex-start; /* 讓紅包從頂部開始排，確保底部不被擠壓 */
            padding: 0 15px;
        }

        .envelope-box {
            width: 29%; 
            aspect-ratio: 300 / 540; /* 確保與 Glaxnimate 的 540 高度同步 */
            margin-bottom: 25px; /* 增加紅包之間的上下間距，視覺更舒服 */
            cursor: pointer;
            overflow: visible; /* 確保動畫超出一點點也不會被切掉 */
        }
        .envelope-box lottie-player {
            width: 100%; height: 100%;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header-section">
        <lottie-player src="GBaCall.lot" speed="1" loop autoplay></lottie-player>
    </div>

    <div class="grid-section">
        <div class="envelope-box" onclick="openPacket(this)"><lottie-player class="p-anim"></lottie-player></div>
        <div class="envelope-box" onclick="openPacket(this)"><lottie-player class="p-anim"></lottie-player></div>
        <div class="envelope-box" onclick="openPacket(this)"><lottie-player class="p-anim"></lottie-player></div>
        <div class="envelope-box" onclick="openPacket(this)"><lottie-player class="p-anim"></lottie-player></div>
        <div class="envelope-box" onclick="openPacket(this)"><lottie-player class="p-anim"></lottie-player></div>
        <div class="envelope-box" onclick="openPacket(this)"><lottie-player class="p-anim"></lottie-player></div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();

    const urlParams = new URLSearchParams(window.location.search);
    const prize = urlParams.get('prize') || 'sorry';
    
    const prizeFiles = {
        '25': '25.lot', '20': '20.lot', '15': '15.lot',
        '10': '10.lot', '5': '5.lot', 'sorry': 'sorry.lot'
    };

    document.querySelectorAll('.p-anim').forEach(player => {
        player.load(prizeFiles[prize]);
    });

    let hasOpened = false;
    function openPacket(el) {
        if (hasOpened) return;
        hasOpened = true;
        const player = el.querySelector('.p-anim');
        player.play();
        
        // 播完後自動關閉，時間可根據你的動畫長度微調
        setTimeout(() => { tg.close(); }, 3500);
    }
</script>
</body>
</html>
